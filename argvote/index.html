        }

            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .image-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 3rem 0;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .pixel-image {
            width: 264px;
            height: 164px;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            transition: transform 0.3s ease;
            cursor: pointer;
            border: 4px solid #9e9e9e;
            border-radius: 8px;
            background-color: #5f5e5e;
        }

        .pixel-image:hover {
            transform: scale(1.1);
            border-color: #ffffff;
        }

        .version {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 0.8rem;
            color: #95a5a6;
            font-family: 'Courier New', monospace;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #7a7a7a;
            padding: 2rem;
            border-radius: 10px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .modal h2 {
            color: #e74c3c;
            margin-bottom: 1rem;
        }

        .modal p {
            margin-bottom: 1.5rem;
        }

        .modal-buttons {
            display: flex;
            justify-content: space-around;
        }

        button {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 5px;
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .confirm-btn {
            background-color: #a7a7a7;
            color: white;
        }

        .cancel-btn {
            background-color: #a8a8a8;
            color: white;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 768px) {
            .image-container {

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const leftImage = document.getElementById('left-image');
            const rightImage = document.getElementById('right-image');
            const modal = document.getElementById('modal');
            const confirmBtn = document.getElementById('confirm-btn');
            const cancelBtn = document.getElementById('cancel-btn');
            const version = document.getElementById('version');

            let selectedOption = '';

            // 图片点击事件
            leftImage.addEventListener('click', function () {
                selectedOption = 'left';
                modal.style.display = 'flex';
            });

            rightImage.addEventListener('click', function () {
                selectedOption = 'right';
                modal.style.display = 'flex';
            });

            // 确认按钮点击事件
            confirmBtn.addEventListener('click', function () {
                modal.style.display = 'none';

                if (selectedOption === 'left') {
                    // 跳转到左图结果页面
                    window.location.href = 'left-result.html';
                } else if (selectedOption === 'right') {
                    // 跳转到右图结果页面
                    window.location.href = 'right-result.html';
                }
            });

            // 取消按钮点击事件
            cancelBtn.addEventListener('click', function () {
                modal.style.display = 'none';
            });

            // 点击模态框外部关闭
            window.addEventListener('click', function (event) {
                if (event.target === modal) {
                    modal.style.display = 'none';
                }
            });
        });
    </script>
